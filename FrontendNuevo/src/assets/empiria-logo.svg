<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Empiria logo</title>
<desc id="desc">Empiria logo in gold and white with icon, wordmark and tagline.</desc>
<defs>
  <linearGradient id="gold" x1="210" y1="40" x2="330" y2="210" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#FFE88A"/>
    <stop offset="0.35" stop-color="#F0C44F"/>
    <stop offset="0.7" stop-color="#B77818"/>
    <stop offset="1" stop-color="#FFE07A"/>
  </linearGradient>
  <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFE98D"/>
    <stop offset="0.45" stop-color="#E2AC35"/>
    <stop offset="1" stop-color="#8F5C13"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
</defs>

<!-- Icon -->
<g transform="translate(365 25)" filter="url(#shadow)">
  <!-- broken circular ring -->
  <path d="M135 170C100.5 190.5 56 183 30 153C0 118 2 65 35 32C68 -1 122 -1 155 32C188 65 190 118 160 153C153 161 145 166 135 170Z"
        stroke="url(#gold)" stroke-width="20" stroke-linecap="round" fill="none"
        stroke-dasharray="365 88" stroke-dashoffset="45"/>
  <!-- head -->
  <circle cx="95" cy="61" r="22" fill="url(#gold2)"/>
  <!-- left pillar -->
  <path d="M64 98L91 124V188L64 172V98Z" fill="url(#gold2)"/>
  <!-- right pillar -->
  <path d="M126 98L99 124V188L126 172V98Z" fill="url(#gold2)"/>
  <!-- center split -->
  <path d="M94 130V190" stroke="#1A1207" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
</g>

<!-- Wordmark -->
<g fill="#F5F6F8" font-family="Montserrat, Inter, Arial, sans-serif" text-anchor="middle">
  <text x="450" y="245" font-size="58" font-weight="400" letter-spacing="31">EMPIRIA</text>
</g>

<!-- Gold divider -->
<rect x="420" y="270" width="60" height="2.5" rx="1.25" fill="url(#gold)"/>

<!-- Tagline -->
<text x="450" y="318" fill="#E7E8EB" font-family="Montserrat, Inter, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="6" text-anchor="middle">
  TECNOLOGÍA PARA LA GESTIÓN DEL TALENTO HUMANO
</text>
</svg>
